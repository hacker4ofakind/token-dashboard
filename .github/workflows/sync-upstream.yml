name: Sync fork with upstream

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync with muckybuzzwoo/token-dashboard
        run: |
          git remote add upstream https://github.com/muckybuzzwoo/token-dashboard.git
          git fetch upstream main
          git checkout main
          git reset --hard upstream/main
          git push origin main --force
